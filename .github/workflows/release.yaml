name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive: kv-linux-amd64.tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive: kv-linux-arm64.tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            archive: kv-macos-amd64.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            archive: kv-macos-arm64.tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: kv-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          bin=target/${{ matrix.target }}/release/kv
          tar czf ${{ matrix.archive }} -C $(dirname $bin) $(basename $bin)

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          $bin = "target\${{ matrix.target }}\release\kv.exe"
          Compress-Archive -Path $bin -DestinationPath ${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: artifacts/*
          prerelease: false
